# Cloud Build pipeline for Java Demo App
# ─────────────────────────────────────────────────────────
# Builds the Docker image, pushes to Artifact Registry,
# deploys to Cloud Run with OTel env vars injected here.
#
# ⚠ NO sidecar — Java Agent exports directly to GCP
#   via the google-cloud-opentelemetry extension (ADC).
# ─────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _REPO: otel-demo
  _SERVICE_NAME: java-demo-app
  # ── OTel Configuration (change here, not in Dockerfile) ──
  _OTEL_SERVICE_NAME: java-demo-app
  _OTEL_TRACES_EXPORTER: google_cloud_trace
  _OTEL_METRICS_EXPORTER: google_cloud_monitoring
  _OTEL_LOGS_EXPORTER: none
  _OTEL_TRACES_SAMPLER: parentbased_traceidratio
  _OTEL_TRACES_SAMPLER_ARG: "1.0"

steps:
  # ── Step 1: Build Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "."
    dir: "java-app"

  # ── Step 2: Push image to Artifact Registry ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # ── Step 3: Deploy to Cloud Run (no sidecar, direct GCP export) ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=otel-app-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - "OTEL_SERVICE_NAME=${_OTEL_SERVICE_NAME},OTEL_TRACES_EXPORTER=${_OTEL_TRACES_EXPORTER},OTEL_METRICS_EXPORTER=${_OTEL_METRICS_EXPORTER},OTEL_LOGS_EXPORTER=${_OTEL_LOGS_EXPORTER},OTEL_TRACES_SAMPLER=${_OTEL_TRACES_SAMPLER},OTEL_TRACES_SAMPLER_ARG=${_OTEL_TRACES_SAMPLER_ARG},OTEL_RESOURCE_ATTRIBUTES=service.namespace=otel-demo"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
