# Unified Cloud Build pipeline — Build & deploy all three services
# ─────────────────────────────────────────────────────────
# Trigger:
#   gcloud builds submit --config=cloudbuild-all.yaml \
#     --project=otel-test-samolab \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD)
# ─────────────────────────────────────────────────────────
# Architecture:
#   App Container (OTel agent) ──► Centralized OTel Collector
#                                     ├──► GCP Cloud Trace
#                                     ├──► GCP Cloud Monitoring
#                                     └──► GCP Cloud Logging
#
# Collector URL: https://otel-collector-45801363652.asia-east1.run.app
# ─────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _REPO: otel-demo

steps:
  # ════════════════════════════════════════════
  #  Build all images (parallel)
  # ════════════════════════════════════════════
  - id: "build-java"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:latest", "."]
    dir: "java-app"

  - id: "build-dotnet"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:latest", "."]
    dir: "dotnet-app"

  - id: "build-python"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:latest", "."]
    dir: "python-app"

  # ════════════════════════════════════════════
  #  Push all images (after build)
  # ════════════════════════════════════════════
  - id: "push-java"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app"]
    waitFor: ["build-java"]

  - id: "push-dotnet"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app"]
    waitFor: ["build-dotnet"]

  - id: "push-python"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app"]
    waitFor: ["build-python"]

  # ════════════════════════════════════════════
  #  Deploy all services → Centralized OTel Collector
  #  所有 OTel env vars 統一用 env-dev.yaml
  # ════════════════════════════════════════════

  - id: "deploy-java"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-java"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "java-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=service-cloudrun@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--env-vars-file=java-app/env-dev.yaml"

  - id: "deploy-dotnet"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-dotnet"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "dotnet-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=service-cloudrun@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--env-vars-file=dotnet-app/env-dev.yaml"

  - id: "deploy-python"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-python"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "python-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=service-cloudrun@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--env-vars-file=python-app/env-dev.yaml"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
