# Unified Cloud Build pipeline — Build & deploy all three services
# ─────────────────────────────────────────────────────────
# Trigger:
#   gcloud builds submit --config=cloudbuild-all.yaml \
#     --project=<PROJECT_ID> \
#     --substitutions=SHORT_SHA=$(git rev-parse --short HEAD)
# ─────────────────────────────────────────────────────────
# Architecture (now):
#   App Container (OTel agent) ──► GCP Cloud Trace / Monitoring
#   No sidecar, no Collector.
#
# Migration path (future 10+ services):
#   Just change _OTEL_EXPORTER_OTLP_ENDPOINT to your
#   centralized Collector URL. Zero app/image changes.
# ─────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _REPO: otel-demo

steps:
  # ════════════════════════════════════════════
  #  Build all images (parallel)
  # ════════════════════════════════════════════
  - id: "build-java"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:latest", "."]
    dir: "java-app"

  - id: "build-dotnet"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:latest", "."]
    dir: "dotnet-app"

  - id: "build-python"
    name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:latest", "."]
    dir: "python-app"

  # ════════════════════════════════════════════
  #  Push all images (after build)
  # ════════════════════════════════════════════
  - id: "push-java"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app"]
    waitFor: ["build-java"]

  - id: "push-dotnet"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app"]
    waitFor: ["build-dotnet"]

  - id: "push-python"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app"]
    waitFor: ["build-python"]

  # ════════════════════════════════════════════
  #  Deploy all services (no sidecar, direct GCP export)
  #  OTel env vars are injected here, not in Dockerfiles.
  # ════════════════════════════════════════════

  - id: "deploy-java"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-java"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "java-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=otel-app-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - "OTEL_SERVICE_NAME=java-demo-app,OTEL_TRACES_EXPORTER=google_cloud_trace,OTEL_METRICS_EXPORTER=google_cloud_monitoring,OTEL_LOGS_EXPORTER=none,OTEL_RESOURCE_ATTRIBUTES=service.namespace=otel-demo"

  - id: "deploy-dotnet"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-dotnet"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "dotnet-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=otel-app-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - "OTEL_SERVICE_NAME=dotnet-demo-app,OTEL_TRACES_EXPORTER=otlp,OTEL_METRICS_EXPORTER=otlp,OTEL_LOGS_EXPORTER=none,OTEL_RESOURCE_ATTRIBUTES=service.namespace=otel-demo"

  - id: "deploy-python"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-python"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "python-demo-app"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=otel-app-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--set-env-vars"
      - "OTEL_SERVICE_NAME=python-demo-app,OTEL_TRACES_EXPORTER=gcp_trace,OTEL_METRICS_EXPORTER=gcp_monitoring,OTEL_LOGS_EXPORTER=none,OTEL_RESOURCE_ATTRIBUTES=service.namespace=otel-demo,OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/java-demo-app:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/dotnet-demo-app:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/python-demo-app:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
