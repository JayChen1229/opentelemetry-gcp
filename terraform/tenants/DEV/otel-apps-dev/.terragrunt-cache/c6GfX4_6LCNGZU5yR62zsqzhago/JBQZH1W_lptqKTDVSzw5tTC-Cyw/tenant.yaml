# =========================================================================
# 🔭 Tenant: otel-collector-dev (DEV)
# =========================================================================
# 集中式 OpenTelemetry Collector 專案
# 負責接收所有應用服務的遙測資料並轉發到 GCP
# =========================================================================

project:
  id: "otel-collector-dev"
  name: "OTel Collector DEV"
  environment: "DEV"
  region: "asia-east1"

# ── 啟用的 GCP APIs ──
enabled_apis:
  - "run.googleapis.com"
  - "cloudbuild.googleapis.com"
  - "artifactregistry.googleapis.com"
  - "cloudtrace.googleapis.com"
  - "monitoring.googleapis.com"
  - "logging.googleapis.com"
  - "iam.googleapis.com"
  - "cloudresourcemanager.googleapis.com"

# ── CI/CD Builder SA ──
builder_sa:
  name: "service-cicd"
  roles:
    - "roles/run.admin"
    - "roles/artifactregistry.writer"
    - "roles/logging.logWriter"
    - "roles/storage.admin"

# ── Collector Runtime SA ──
runtime_sa:
  name: "service-collector"
  roles:
    - "roles/cloudtrace.agent"
    - "roles/monitoring.metricWriter"
    - "roles/logging.logWriter"

# ── Artifact Registry ──
repo_name: "otel-collector"

# ── Labels ──
labels:
  purpose: "observability"
