# Cloud Build pipeline for Python Demo App
# ─────────────────────────────────────────────────────────
# Uses Kaniko for layer caching across builds.
# OTel env vars are loaded from env-{_ENV}.yaml.
#
# 已改為直連集中式 OTel Collector
# ─────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _REPO: otel-demo
  _SERVICE_NAME: python-demo-app
  _ENV: dev  # dev | prod — selects env-{_ENV}.yaml
  _TAG: latest  # Trigger 會傳 SHORT_SHA，手動 submit 用 latest

steps:
  # ── Step 1: Build & Push ──
  - name: "gcr.io/kaniko-project/executor:latest"
    args:
      - "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${_TAG}"
      - "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "--cache=true"
      - "--cache-repo=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}-cache"
      - "--cache-ttl=168h"
      - "--dockerfile=python-app/Dockerfile"
      - "--context=dir://python-app"

  # ── Step 2: Deploy to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${_TAG}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=service-cloudrun@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--env-vars-file=python-app/env-${_ENV}.yaml"

options:
  logging: CLOUD_LOGGING_ONLY

# ── 企業級資安最佳實踐：明確指定 Cloud Build 的執行身分 ──
serviceAccount: 'projects/${PROJECT_ID}/serviceAccounts/service-cicd@${PROJECT_ID}.iam.gserviceaccount.com'
