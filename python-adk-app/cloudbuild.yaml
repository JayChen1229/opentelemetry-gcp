# Cloud Build pipeline for Python Google ADK Agent (Zero-Code OTel 版)
# ─────────────────────────────────────────────────────────

substitutions:
  _REGION: asia-east1
  _REPO: otel-demo
  _SERVICE_NAME: python-adk-agent
  # ── OTel Configuration (由 Cloud Build 統一管理) ──
  # _OTEL_SERVICE_NAME: python-adk-agent
  # _OTEL_TRACES_EXPORTER: gcp_trace
  # _OTEL_METRICS_EXPORTER: none
  # _OTEL_LOGS_EXPORTER: none
  # _OTEL_TRACES_SAMPLER: parentbased_traceidratio
  # _OTEL_TRACES_SAMPLER_ARG: "0.1"
  # _OTEL_RESOURCE_ATTRIBUTES: "service.name=python-adk-agent"

steps:
  # ── Step 1: Build Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"
      - "."
    dir: "python-adk-app"

  # ── Step 2: Push image to Artifact Registry ──
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}"

  # ── Step 3: Deploy to Cloud Run (注入 OTel 環境變數) ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--project=${PROJECT_ID}"
      - "--platform=managed"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--service-account=otel-app-runtime@${PROJECT_ID}.iam.gserviceaccount.com"
      - "--env-vars-file=python-adk-app/env-prod.yaml"
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
